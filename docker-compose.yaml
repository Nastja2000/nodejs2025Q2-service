version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: home_library
    volumes:
      - db_data:/var/lib/postgresql/data
      - db_logs:/var/log/postgresql
    networks:
      - backend

  app:
    build: .
    restart: always
    container_name: home_library_app
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: home_library
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "
        npm run migration:run &&
        npm run start:prod
      "
    networks:
      - backend

volumes:
  db_data:
  db_logs:

networks:
  backend:
    driver: bridge