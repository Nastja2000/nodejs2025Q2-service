version: '3.9'

services:
  app:
    build: .
    container_name: app
    ports:
      - '4000:4000'
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: home_library
      PORT: 4000
    depends_on:
      - postgres
    networks:
      - homeLibrary-net
    volumes:
      - ./src:/app/src
    command: npm run start:prod

  postgres:
    image: postgres:13-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: home_library
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/logs:/var/log/postgresql
    ports:
      - '5432:5432'
    networks:
      - library-net

networks:
  library-net:
    driver: bridge

volumes:
  pgdata: